<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>카테고리 등록</title>
  <style>
    body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #333; }
    h1 { border-bottom: 2px solid #3498db; padding-bottom: 10px; color: #2c3e50; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 6px; }
    input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid #ced4da; border-radius: 4px; font-size: 1em; box-sizing: border-box; }
    .error-msg { color: #e74c3c; font-size: 0.85em; margin-top: 5px; display: block; }
    .btn-submit { background: #3498db; color: white; border: none; padding: 12px 32px; font-size: 1em; border-radius: 4px; cursor: pointer; }
    .back-btn { display: inline-block; padding: 8px 16px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 24px; }
  </style>
</head>
<body>
<h1>카테고리 등록</h1>

<a class="back-btn" href="/categories">← 목록으로 돌아가기</a>

<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
  <div class="form-group">
    <label>카테고리 이름 <span style="color:red">*</span></label>
    <input type="text" th:field="*{name}" placeholder="카테고리 이름을 입력하세요"/>
    <span class="error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
  </div>
  <button type="submit" class="btn-submit">등록</button>
</form>

<p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2071336 | 성명: 허성재'}"></p>
</body>
</html>
